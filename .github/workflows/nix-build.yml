name: Nix build

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nix-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: NixOS p14s
            runner: ubuntu-24.04
            target: .#nixosConfigurations.p14s.config.system.build.toplevel
          - name: Home Manager nakasyou
            runner: ubuntu-24.04
            target: .#nixosConfigurations.p14s.config.home-manager.users.nakasyou.home.activationPackage
          - name: nix-darwin mac-mini
            runner: macos-15
            target: .#darwinConfigurations.mac-mini.system

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            extra-substituters = https://cache.nakasyou.how
            extra-trusted-public-keys = cache.nakasyou.how-1:BumjaqVgJE6uAuaJcoV1oeFKPEyPxZ73XNmxVskqQZM=

      - name: Show flake outputs
        run: nix flake show

      - name: Build ${{ matrix.target }}
        run: nix build --print-build-logs "${{ matrix.target }}"
