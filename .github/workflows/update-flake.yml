name: Update flake.lock

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-flake
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Update flake inputs
        id: update
        run: |
          nix flake update \
            nixpkgs \
            home-manager \
            nix-darwin \
            moonbit-overlay \
            nix-vite-plus \
            llm-agents

          if git diff --quiet -- flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "flake.lock is already up to date"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Check flake outputs
        if: steps.update.outputs.changed == 'true'
        run: nix flake show

      - name: Create update pull request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: actions-user/update-flake-lock
          base: ${{ github.ref_name }}
          delete-branch: true
          author: actions-user <actions-user@users.noreply.github.com>
          committer: actions-user <actions-user@users.noreply.github.com>
          commit-message: "flake.lock: update inputs"
          title: "flake.lock: update inputs"
          body: |
            Automated update of the flake inputs.

            The flake outputs were evaluated with `nix flake show` before opening this PR.
