name: Update Codex Desktop for Linux

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-codex-desktop
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            extra-substituters = https://cache.nakasyou.how
            extra-trusted-public-keys = cache.nakasyou.how-1:BumjaqVgJE6uAuaJcoV1oeFKPEyPxZ73XNmxVskqQZM=

      - name: Update Codex Desktop input
        id: update
        run: |
          nix flake update codex-desktop-linux

          if git diff --quiet -- flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "codex-desktop-linux is already up to date"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Build Home Manager configuration
        if: steps.update.outputs.changed == 'true'
        run: >-
          nix build
          --print-build-logs
          --no-link
          .#nixosConfigurations.p14s.config.home-manager.users.nakasyou.home.activationPackage

      - name: Create Codex Desktop update pull request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: actions-user/update-codex-desktop-linux
          base: ${{ github.ref_name }}
          delete-branch: true
          author: actions-user <actions-user@users.noreply.github.com>
          committer: actions-user <actions-user@users.noreply.github.com>
          commit-message: "flake: update codex-desktop-linux"
          title: "flake: update codex-desktop-linux"
          body: |
            Manually requested update of the `codex-desktop-linux` input.

            The P14s Home Manager activation package was built successfully before opening this PR.
