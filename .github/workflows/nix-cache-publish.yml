name: Nix build and publish

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nix-build-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: Linux
            runner: ubuntu-24.04
            cache_root: linux
            targets: >-
              .#nixosConfigurations.p14s.config.system.build.toplevel
              .#nixosConfigurations.p14s.config.home-manager.users.nakasyou.home.activationPackage
          - name: macOS
            runner: macos-15
            cache_root: darwin
            targets: >-
              .#darwinConfigurations.mac-mini.system

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            extra-substituters = https://cache.nakasyou.how
            extra-trusted-public-keys = cache.nakasyou.how-1:BumjaqVgJE6uAuaJcoV1oeFKPEyPxZ73XNmxVskqQZM=

      - name: Show flake outputs
        run: nix flake show

      - name: Build
        run: |
          : > "$RUNNER_TEMP/nix-cache-roots"
          for target in ${{ matrix.targets }}; do
            max_attempts=5
            for attempt in $(seq 1 "$max_attempts"); do
              if nix build --print-build-logs --no-link "$target"; then
                break
              fi
              if ((attempt == max_attempts)); then
                echo "Failed to build $target after $max_attempts attempts." >&2
                exit 1
              fi
              delay=$((attempt * 30))
              echo "Build attempt $attempt/$max_attempts failed; retrying in ${delay}s." >&2
              sleep "$delay"
            done
            nix path-info "$target" >> "$RUNNER_TEMP/nix-cache-roots"
          done

      - name: Publish signed cache objects
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          NIX_CACHE_SIGNING_KEY: ${{ secrets.NIX_CACHE_SIGNING_KEY }}
          NIX_CACHE_ROOT: ${{ matrix.cache_root }}
        run: |
          chmod +x scripts/publish-nix-cache.sh
          mapfile -t results < "$RUNNER_TEMP/nix-cache-roots"
          scripts/publish-nix-cache.sh "${results[@]}"
