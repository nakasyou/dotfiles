name: Publish Nix binary cache

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nix-cache-publish
  cancel-in-progress: false

jobs:
  publish:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: Linux
            runner: ubuntu-24.04
            cache_root: linux
            targets: >-
              .#nixosConfigurations.p14s.config.system.build.toplevel
              .#nixosConfigurations.p14s.config.home-manager.users.nakasyou.home.activationPackage
          - name: macOS
            runner: macos-15
            cache_root: darwin
            targets: >-
              .#darwinConfigurations.mac-mini.system

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Publish signed cache objects
        env:
          GH_TOKEN: ${{ github.token }}
          NIX_CACHE_SIGNING_KEY: ${{ secrets.NIX_CACHE_SIGNING_KEY }}
          NIX_CACHE_ROOT: ${{ matrix.cache_root }}
        run: |
          chmod +x scripts/publish-nix-cache.sh
          results=()
          for target in ${{ matrix.targets }}; do
            max_attempts=5
            for attempt in $(seq 1 "$max_attempts"); do
              if nix build --print-build-logs --no-link "$target"; then
                break
              fi
              if ((attempt == max_attempts)); then
                echo "Failed to build $target after $max_attempts attempts." >&2
                exit 1
              fi
              delay=$((attempt * 30))
              echo "Build attempt $attempt/$max_attempts failed; retrying in ${delay}s." >&2
              sleep "$delay"
            done
            results+=("$(nix path-info "$target")")
          done
          scripts/publish-nix-cache.sh "${results[@]}"
