services:
  db:
    image: postgres:16-alpine
    container_name: litellm-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-litellm}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-litellm}
      - POSTGRES_DB=${POSTGRES_DB:-litellm}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 5s
      timeout: 5s
      retries: 5

  litellm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://litellm:litellm@db:5432/litellm}
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
      # Mount xAI OAuth token (after running `litellm xai-oauth login` on host)
      - ${HOME}/.config/litellm/xai_oauth:/root/.config/litellm/xai_oauth
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/readiness', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
